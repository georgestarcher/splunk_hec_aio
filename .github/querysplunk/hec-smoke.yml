app: search
output_file: splunkresults.json
mode: job
search: |
  search index=__SPLUNK_HEC_INDEX__
    sourcetype=__SPLUNK_HEC_SOURCETYPE__
    ci_test_id="__SPLUNK_HEC_TEST_ID__"
  | stats count as event_count dc(batch_position) as batch_position_count
  | where event_count >= 3 AND batch_position_count = 3
  | stats count as matched

dispatch:
  earliest_time: "-10m"
  latest_time: "now"
  max_count: 1
  status_buckets: 0
  required_fields:
    - ci_test_id
    - batch_position

results:
  endpoint: auto
  output_mode: json
  count: 1
  offset: 0

safety:
  allow_old_earliest: false
  allow_index_wildcard: false

diagnostics:
  search_log: summary
