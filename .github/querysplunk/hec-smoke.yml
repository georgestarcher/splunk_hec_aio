app: search
output_file: splunkresults.json
mode: job
search: |
  search index=__SPLUNK_HEC_INDEX__
    sourcetype=__SPLUNK_HEC_SOURCETYPE__
    ci_test_id="__SPLUNK_HEC_TEST_ID__"
  | stats count as event_count dc(batch_position) as position_count by send_shape
  | eval shape_verified=case(
      send_shape="single" AND event_count >= 1 AND position_count = 1, 1,
      send_shape="batch" AND event_count >= 3 AND position_count = 3, 1,
      true(), 0)
  | stats count as shape_count min(shape_verified) as all_verified
  | where shape_count = 2 AND all_verified = 1
  | stats count as matched

dispatch:
  earliest_time: "-10m"
  latest_time: "now"
  status_buckets: 0
  required_fields:
    - ci_test_id
    - send_shape
    - batch_position

results:
  endpoint: auto
  output_mode: json
  count: 1
  offset: 0

safety:
  allow_old_earliest: false
  allow_index_wildcard: false

diagnostics:
  search_log: summary
