name: Release verification

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable candidate version in X.Y.Z form
        required: true
        type: string
      compatibility:
        description: Compatibility classification for this release
        required: true
        type: choice
        options:
          - no-observable-behavior-change
          - backward-compatible-bug-fix
          - opt-in-addition
          - breaking-major-release

permissions:
  contents: read

concurrency:
  group: release-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Release / validate candidate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Require the main branch before checkout
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Release verification must run from refs/heads/main." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate source, ref, version, and classification
        env:
          CANDIDATE_VERSION: ${{ inputs.version }}
          COMPATIBILITY_CLASSIFICATION: ${{ inputs.compatibility }}
        run: >-
          python .github/scripts/verify_release_candidate.py validate
          --version "$CANDIDATE_VERSION"
          --classification "$COMPATIBILITY_CLASSIFICATION"
          --ref "$GITHUB_REF"

      - name: Confirm the candidate checkout is clean
        run: git diff --exit-code

  compatibility:
    name: Release / compatibility gates
    needs: validate
    uses: ./.github/workflows/compatibility.yml

  quality:
    name: Release / quality gates
    needs: validate
    uses: ./.github/workflows/quality.yml

  packaging:
    name: Release / packaging gates
    needs: validate
    uses: ./.github/workflows/packaging.yml

  candidate:
    name: Release / exact candidate artifacts
    needs:
      - compatibility
      - packaging
      - quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python 3.13 packaging environment
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install packaging tools
        run: >-
          python -m pip install --disable-pip-version-check
          "build==1.4.4" "twine==6.2.0"

      - name: Build the exact candidate wheel and source distribution
        run: python -m build

      - name: Check candidate metadata and contents
        env:
          CANDIDATE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          python -m twine check dist/*
          python tests/packaging/verify_artifacts.py \
            --expected-version "$CANDIDATE_VERSION" dist/*

      - name: Stage installed-distribution checks outside the checkout
        shell: bash
        run: |
          set -euo pipefail
          verification_root="$RUNNER_TEMP/installed-suite"
          mkdir -p "$verification_root"
          cp -R tests "$verification_root/tests"

      - name: Install and verify the exact candidate artifacts
        env:
          CANDIDATE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          for format in wheel sdist; do
            environment="$RUNNER_TEMP/candidate-$format"
            python -m venv "$environment"
            if [[ "$format" == wheel ]]; then
              artifact=("$GITHUB_WORKSPACE"/dist/*.whl)
            else
              artifact=("$GITHUB_WORKSPACE"/dist/*.tar.gz)
            fi
            test "${#artifact[@]}" -eq 1
            "$environment/bin/python" -m pip install --disable-pip-version-check \
              --no-cache-dir "${artifact[0]}"
            cd "$RUNNER_TEMP/installed-suite"
            SOURCE_CHECKOUT="$GITHUB_WORKSPACE" \
              "$environment/bin/python" \
                tests/packaging/verify_installed_distribution.py \
                --expected-version "$CANDIDATE_VERSION"
            PYTHONDONTWRITEBYTECODE=1 PYTHONWARNINGS=error \
              "$environment/bin/python" -m unittest discover \
                -s tests -p 'test_v2_public_api.py' -v
          done

      - name: Generate release-candidate manifest and checksums
        env:
          CANDIDATE_VERSION: ${{ inputs.version }}
          COMPATIBILITY_CLASSIFICATION: ${{ inputs.compatibility }}
        run: >-
          python .github/scripts/verify_release_candidate.py manifest
          --version "$CANDIDATE_VERSION"
          --classification "$COMPATIBILITY_CLASSIFICATION"
          --ref "$GITHUB_REF"
          --commit "$GITHUB_SHA"
          --output release-candidate
          --source-root .
          dist/*

      - name: Stage the verified candidate bundle
        shell: bash
        run: |
          set -euo pipefail
          cp dist/* release-candidate/
          cd release-candidate
          sha256sum --check --strict SHA256SUMS

      - name: Upload the temporary release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate-${{ inputs.version }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-candidate/
          if-no-files-found: error
          retention-days: 7

      - name: Confirm release verification did not change tracked files
        run: git diff --exit-code
