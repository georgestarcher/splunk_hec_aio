name: Publish verified GitHub release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable release version in X.Y.Z form
        required: true
        type: string
      compatibility:
        description: Compatibility classification from verification
        required: true
        type: choice
        options:
          - no-observable-behavior-change
          - backward-compatible-bug-fix
          - opt-in-addition
          - breaking-major-release
      verification_run_id:
        description: Successful Release verification workflow run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: github-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    name: Publication / validate signed tag and evidence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      artifact: ${{ steps.release.outputs.artifact }}
      commit: ${{ steps.release.outputs.commit }}
      tag: ${{ steps.release.outputs.tag }}
      tag_object: ${{ steps.release.outputs.tag_object }}

    steps:
      - name: Require the main branch before checkout
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Release publication must run from refs/heads/main." >&2
            exit 1
          fi

      - name: Validate the signed tag and verification run
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Version must be a stable semantic version in X.Y.Z form." >&2
            exit 1
          fi
          if [[ ! "$VERIFICATION_RUN_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "Verification run ID must be a positive integer." >&2
            exit 1
          fi

          EXPECTED_TAG="v$RELEASE_VERSION"
          TAG_REF_JSON="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$EXPECTED_TAG")"
          TAG_REF_TYPE="$(jq -r '.object.type' <<<"$TAG_REF_JSON")"
          if [[ "$TAG_REF_TYPE" != "tag" ]]; then
            echo "$EXPECTED_TAG must be an annotated tag, not a lightweight tag." >&2
            exit 1
          fi
          TAG_OBJECT_SHA="$(jq -r '.object.sha' <<<"$TAG_REF_JSON")"
          TAG_JSON="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$TAG_OBJECT_SHA")"
          TAG_VERIFIED="$(jq -r '.verification.verified // false' <<<"$TAG_JSON")"
          if [[ "$TAG_VERIFIED" != "true" ]]; then
            echo "$EXPECTED_TAG must have a signature verified by GitHub." >&2
            exit 1
          fi
          if [[ "$(jq -r '.tag' <<<"$TAG_JSON")" != "$EXPECTED_TAG" ]] || \
             [[ "$(jq -r '.object.type' <<<"$TAG_JSON")" != "commit" ]]; then
            echo "Annotated tag identity or target type is invalid." >&2
            exit 1
          fi
          TAG_COMMIT="$(jq -r '.object.sha' <<<"$TAG_JSON")"
          MAIN_COMMIT="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          if [[ "$TAG_COMMIT" != "$MAIN_COMMIT" ]]; then
            echo "$EXPECTED_TAG must point to the current main commit." >&2
            exit 1
          fi
          if [[ "$GITHUB_SHA" != "$TAG_COMMIT" ]]; then
            echo "The dispatched workflow revision must match $EXPECTED_TAG." >&2
            exit 1
          fi

          RUN_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$VERIFICATION_RUN_ID")"
          RUN_EVENT="$(jq -r '.event' <<<"$RUN_JSON")"
          RUN_PATH="$(jq -r '.path' <<<"$RUN_JSON")"
          RUN_STATUS="$(jq -r '.status' <<<"$RUN_JSON")"
          RUN_CONCLUSION="$(jq -r '.conclusion' <<<"$RUN_JSON")"
          RUN_COMMIT="$(jq -r '.head_sha' <<<"$RUN_JSON")"
          RUN_BRANCH="$(jq -r '.head_branch' <<<"$RUN_JSON")"
          RUN_ATTEMPT="$(jq -r '.run_attempt' <<<"$RUN_JSON")"
          EXPECTED_RUN_PATH=".github/workflows/release-verification.yml"
          if [[ "$RUN_PATH" != "$EXPECTED_RUN_PATH" ]] && \
             [[ "$RUN_PATH" != "${EXPECTED_RUN_PATH}@main" ]]; then
            echo "Run $VERIFICATION_RUN_ID did not execute the release-verification workflow on main." >&2
            exit 1
          fi
          if [[ "$RUN_EVENT" != "workflow_dispatch" ]] || \
             [[ "$RUN_STATUS" != "completed" ]] || \
             [[ "$RUN_CONCLUSION" != "success" ]] || \
             [[ "$RUN_BRANCH" != "main" ]] || \
             [[ "$RUN_COMMIT" != "$TAG_COMMIT" ]]; then
            echo "Run $VERIFICATION_RUN_ID is not successful release evidence for $EXPECTED_TAG." >&2
            exit 1
          fi

          EXPECTED_ARTIFACT="release-candidate-$RELEASE_VERSION-$VERIFICATION_RUN_ID-$RUN_ATTEMPT"
          ARTIFACTS_JSON="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$VERIFICATION_RUN_ID/artifacts")"
          MATCHING_ARTIFACTS="$(
            jq --arg name "$EXPECTED_ARTIFACT" \
              '[.artifacts[] | select(.name == $name and .expired == false)] | length' \
              <<<"$ARTIFACTS_JSON"
          )"
          if [[ "$(jq -r '.total_count' <<<"$ARTIFACTS_JSON")" != "1" ]] || \
             [[ "$MATCHING_ARTIFACTS" != "1" ]]; then
            echo "Verification run must retain exactly one unexpired expected candidate bundle." >&2
            exit 1
          fi

          set +e
          gh api "repos/$GITHUB_REPOSITORY/releases/tags/$EXPECTED_TAG" \
            >"$RUNNER_TEMP/existing-release.json" \
            2>"$RUNNER_TEMP/existing-release.error"
          RELEASE_STATUS=$?
          set -e
          if [[ "$RELEASE_STATUS" -eq 0 ]]; then
            echo "Release already exists for $EXPECTED_TAG; refusing to overwrite it." >&2
            exit 1
          fi
          if ! grep -Fq "HTTP 404" "$RUNNER_TEMP/existing-release.error"; then
            echo "Could not prove that $EXPECTED_TAG has no existing release." >&2
            exit 1
          fi

          {
            echo "artifact=$EXPECTED_ARTIFACT"
            echo "commit=$TAG_COMMIT"
            echo "tag=$EXPECTED_TAG"
            echo "tag_object=$TAG_OBJECT_SHA"
          } >>"$GITHUB_OUTPUT"

  prepare:
    name: Publication / revalidate immutable candidate bundle
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the verified release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.commit }}
          persist-credentials: false

      - name: Download the exact verified candidate bundle
        env:
          ARTIFACT_NAME: ${{ needs.validate.outputs.artifact }}
          GH_TOKEN: ${{ github.token }}
          VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
        run: >-
          gh run download "$VERIFICATION_RUN_ID"
          --name "$ARTIFACT_NAME"
          --dir release-candidate

      - name: Revalidate source and candidate evidence
        env:
          CANDIDATE_COMMIT: ${{ needs.validate.outputs.commit }}
          CANDIDATE_VERSION: ${{ inputs.version }}
          COMPATIBILITY_CLASSIFICATION: ${{ inputs.compatibility }}
        run: |
          set -euo pipefail
          python .github/scripts/verify_release_candidate.py validate \
            --version "$CANDIDATE_VERSION" \
            --classification "$COMPATIBILITY_CLASSIFICATION" \
            --ref refs/heads/main
          python .github/scripts/verify_release_candidate.py bundle \
            --directory release-candidate \
            --version "$CANDIDATE_VERSION" \
            --classification "$COMPATIBILITY_CLASSIFICATION" \
            --ref refs/heads/main \
            --commit "$CANDIDATE_COMMIT" \
            --source-root .

      - name: Confirm preparation did not change tracked files
        run: git diff --exit-code

  publish:
    name: Publication / create immutable GitHub release
    needs:
      - prepare
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: GITHUB_RELEASE
    permissions:
      actions: read
      attestations: read
      contents: write

    steps:
      - name: Check out the verified release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.validate.outputs.commit }}
          persist-credentials: false

      - name: Download the exact verified candidate bundle
        env:
          ARTIFACT_NAME: ${{ needs.validate.outputs.artifact }}
          GH_TOKEN: ${{ github.token }}
          VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
        run: >-
          gh run download "$VERIFICATION_RUN_ID"
          --name "$ARTIFACT_NAME"
          --dir release-candidate

      - name: Revalidate the approved candidate bundle
        env:
          CANDIDATE_COMMIT: ${{ needs.validate.outputs.commit }}
          CANDIDATE_VERSION: ${{ inputs.version }}
          COMPATIBILITY_CLASSIFICATION: ${{ inputs.compatibility }}
        run: >-
          python .github/scripts/verify_release_candidate.py bundle
          --directory release-candidate
          --version "$CANDIDATE_VERSION"
          --classification "$COMPATIBILITY_CLASSIFICATION"
          --ref refs/heads/main
          --commit "$CANDIDATE_COMMIT"
          --source-root .

      - name: Confirm the signed tag is still unchanged
        env:
          EXPECTED_COMMIT: ${{ needs.validate.outputs.commit }}
          EXPECTED_TAG: ${{ needs.validate.outputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ needs.validate.outputs.tag_object }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          CURRENT_TAG_OBJECT="$(
            gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$EXPECTED_TAG" \
              --jq '.object.sha'
          )"
          if [[ "$CURRENT_TAG_OBJECT" != "$EXPECTED_TAG_OBJECT" ]]; then
            echo "$EXPECTED_TAG changed after validation; refusing to publish." >&2
            exit 1
          fi
          TAG_JSON="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$CURRENT_TAG_OBJECT")"
          if [[ "$(jq -r '.verification.verified // false' <<<"$TAG_JSON")" != "true" ]] || \
             [[ "$(jq -r '.object.sha' <<<"$TAG_JSON")" != "$EXPECTED_COMMIT" ]]; then
            echo "$EXPECTED_TAG signature or commit no longer matches the approval." >&2
            exit 1
          fi
          CURRENT_MAIN_COMMIT="$(
            gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha'
          )"
          if [[ "$CURRENT_MAIN_COMMIT" != "$EXPECTED_COMMIT" ]]; then
            echo "main changed after validation; refusing to publish $EXPECTED_TAG." >&2
            exit 1
          fi

      - name: Publish the verified GitHub release
        env:
          COMPATIBILITY_CLASSIFICATION: ${{ inputs.compatibility }}
          EXPECTED_COMMIT: ${{ needs.validate.outputs.commit }}
          EXPECTED_TAG: ${{ needs.validate.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
          VERIFICATION_RUN_ID: ${{ inputs.verification_run_id }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$EXPECTED_TAG" >/dev/null 2>&1; then
            echo "Release already exists for $EXPECTED_TAG; refusing to overwrite it." >&2
            exit 1
          fi
          case "$COMPATIBILITY_CLASSIFICATION" in
            no-observable-behavior-change)
              release_summary="Release with no intended observable behavior change."
              ;;
            backward-compatible-bug-fix)
              release_summary="Backward-compatible bug-fix release."
              ;;
            opt-in-addition)
              release_summary="Release with additive, opt-in functionality."
              ;;
            breaking-major-release)
              release_summary="Major release with documented migration requirements. Earlier releases remain available."
              ;;
            *)
              echo "Unexpected compatibility classification." >&2
              exit 1
              ;;
          esac
          migration_note=""
          if [[ "$RELEASE_VERSION" == "3.0.0" ]] && \
             [[ "$COMPATIBILITY_CLASSIFICATION" == "breaking-major-release" ]]; then
            release_summary="Major v3 release with documented migration requirements. The immutable v2.1.2 release remains available for legacy users."
            migration_note="Migration guide: https://github.com/$GITHUB_REPOSITORY/blob/$EXPECTED_TAG/docs/migrating-to-v3.md"
          fi
          printf -v RELEASE_NOTES '%s\n\n%s\n%s\n\n%s\n%s\n' \
            "$release_summary" \
            "$migration_note" \
            "Compatibility classification: \`$COMPATIBILITY_CLASSIFICATION\`." \
            "Verified commit: \`$EXPECTED_COMMIT\`." \
            "Release evidence: https://github.com/$GITHUB_REPOSITORY/actions/runs/$VERIFICATION_RUN_ID"
          gh release create "$EXPECTED_TAG" release-candidate/* \
            --fail-on-no-commits \
            --generate-notes \
            --latest \
            --notes "$RELEASE_NOTES" \
            --target "$EXPECTED_COMMIT" \
            --title "$EXPECTED_TAG" \
            --verify-tag

      - name: Verify the published release and exact assets
        env:
          EXPECTED_TAG: ${{ needs.validate.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_JSON="$(
            gh release view "$EXPECTED_TAG" \
              --json assets,isDraft,isPrerelease,name,tagName,url
          )"
          if [[ "$(jq -r '.tagName' <<<"$RELEASE_JSON")" != "$EXPECTED_TAG" ]] || \
             [[ "$(jq -r '.name' <<<"$RELEASE_JSON")" != "$EXPECTED_TAG" ]] || \
             [[ "$(jq -r '.isDraft' <<<"$RELEASE_JSON")" != "false" ]] || \
             [[ "$(jq -r '.isPrerelease' <<<"$RELEASE_JSON")" != "false" ]]; then
            echo "Published release identity or state is incorrect." >&2
            exit 1
          fi
          EXPECTED_ASSETS="$(printf '%s\n' \
            SHA256SUMS \
            release-candidate.json \
            "splunk_hec_aio-$RELEASE_VERSION-py3-none-any.whl" \
            "splunk_hec_aio-$RELEASE_VERSION.tar.gz" | sort)"
          ACTUAL_ASSETS="$(jq -r '.assets[].name' <<<"$RELEASE_JSON" | sort)"
          if [[ "$ACTUAL_ASSETS" != "$EXPECTED_ASSETS" ]]; then
            echo "Published release assets do not match the approved bundle." >&2
            exit 1
          fi
          for attempt in {1..12}; do
            if gh release verify "$EXPECTED_TAG"; then
              break
            fi
            if [[ "$attempt" -eq 12 ]]; then
              echo "Immutable release attestation was not available after 60 seconds." >&2
              exit 1
            fi
            sleep 5
          done
          for asset in release-candidate/*; do
            gh release verify-asset "$EXPECTED_TAG" "$asset"
          done
          jq -r '.url' <<<"$RELEASE_JSON" >>"$GITHUB_STEP_SUMMARY"
