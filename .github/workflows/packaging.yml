name: Packaging

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: packaging-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-install:
    name: Packaging / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install packaging tools
        run: >-
          python -m pip install --disable-pip-version-check
          "build==1.4.4" "twine==6.2.0"

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Verify artifact metadata and contents
        run: python tests/packaging/verify_artifacts.py dist/*

      - name: Stage tests outside the source checkout
        shell: bash
        run: |
          set -euo pipefail
          verification_root="$RUNNER_TEMP/installed-suite"
          mkdir -p "$verification_root"
          cp -R tests "$verification_root/tests"

      - name: Install and test the wheel outside the checkout
        shell: bash
        run: |
          set -euo pipefail
          environment="$RUNNER_TEMP/wheel-environment"
          python -m venv "$environment"
          "$environment/bin/python" -m pip install --disable-pip-version-check \
            --no-cache-dir dist/*.whl
          cd "$RUNNER_TEMP/installed-suite"
          SOURCE_CHECKOUT="$GITHUB_WORKSPACE" \
            "$environment/bin/python" tests/packaging/verify_installed_distribution.py
          PYTHONDONTWRITEBYTECODE=1 PYTHONWARNINGS=error \
            "$environment/bin/python" -m unittest discover \
              -s tests -p 'test_v2_public_api.py' -v

      - name: Install and test the source distribution outside the checkout
        shell: bash
        run: |
          set -euo pipefail
          environment="$RUNNER_TEMP/sdist-environment"
          python -m venv "$environment"
          "$environment/bin/python" -m pip install --disable-pip-version-check \
            --no-cache-dir dist/*.tar.gz
          cd "$RUNNER_TEMP/installed-suite"
          SOURCE_CHECKOUT="$GITHUB_WORKSPACE" \
            "$environment/bin/python" tests/packaging/verify_installed_distribution.py
          PYTHONDONTWRITEBYTECODE=1 PYTHONWARNINGS=error \
            "$environment/bin/python" -m unittest discover \
              -s tests -p 'test_v2_public_api.py' -v

      - name: Run the test suite shipped in the source distribution
        shell: bash
        run: |
          set -euo pipefail
          environment="$RUNNER_TEMP/sdist-environment"
          extracted="$RUNNER_TEMP/sdist-suite"
          mkdir -p "$extracted"
          sdists=("$GITHUB_WORKSPACE"/dist/*.tar.gz)
          test "${#sdists[@]}" -eq 1
          tar -xzf "${sdists[0]}" -C "$extracted"
          roots=("$extracted"/*/)
          test "${#roots[@]}" -eq 1
          test -d "${roots[0]}"
          cd "${roots[0]}"
          PYTHONDONTWRITEBYTECODE=1 PYTHONWARNINGS=error \
            "$environment/bin/python" -m unittest discover \
              -s tests -p 'test_*.py' -v
