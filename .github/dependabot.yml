version: 2

updates:
  - package-ecosystem: pip
    directories:
      - "/"
      - "/.github/requirements"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    rebase-strategy: auto
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: deps
      include: scope
    groups:
      python-runtime:
        patterns:
          - aiohttp
          - aiohttp-retry
        update-types:
          - minor
          - patch
      python-quality:
        patterns:
          - build
          - hypothesis
          - mypy
          - pip-audit
          - pytest
          - pytest-cov
          - ruff
          - twine
        update-types:
          - minor
          - patch
    ignore:
      # build 1.5.0+ requires Python 3.10, while the v2 maintenance line
      # intentionally keeps its development and release tooling on Python 3.9.
      - dependency-name: build
        versions:
          - ">=1.5.0"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
